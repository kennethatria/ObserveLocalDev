<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Linux cloud sandbox architecture</title>
  <desc>Linux host with direct Podman and gVisor, Falco for attack detection, and WebSocket security dashboard</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .th { font-size: 14px; font-weight: 500; }
      .ts { font-size: 12px; font-weight: 400; fill: #5F5E5A; }
      .bg-gray   { fill: #F1EFE8; stroke: #5F5E5A; }
      .bg-coral  { fill: #FAECE7; stroke: #993C1D; }
      .bg-teal   { fill: #E1F5EE; stroke: #0F6E56; }
      .bg-blue   { fill: #E6F1FB; stroke: #185FA5; }
      .bg-amber  { fill: #FAEEDA; stroke: #854F0B; }
      .bg-purple { fill: #EEEDFE; stroke: #534AB7; }
      .bg-box    { fill: #ffffff; stroke: #B4B2A9; }
      .lbl-gray   { fill: #444441; }
      .lbl-coral  { fill: #712B13; }
      .lbl-teal   { fill: #085041; }
      .lbl-blue   { fill: #0C447C; }
      .lbl-amber  { fill: #633806; }
      .lbl-purple { fill: #3C3489; }
      .arr { stroke: #888780; stroke-width: 1.5; fill: none; }
    </style>
  </defs>

  <!-- Linux outer -->
  <rect x="20" y="20" width="640" height="570" rx="20" stroke-width="0.5" class="bg-gray"/>
  <text class="th lbl-gray" x="340" y="42" text-anchor="middle" dominant-baseline="central">Linux host — cloud or bare metal</text>

  <!-- Automation -->
  <rect x="40" y="52" width="600" height="68" rx="8" stroke-width="0.5" class="bg-coral"/>
  <text class="ts lbl-coral" x="60" y="68" dominant-baseline="central">Phase 5 — Automation</text>
  <rect x="60"  y="74" width="176" height="36" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="148" y="92" text-anchor="middle" dominant-baseline="central">mise</text>
  <rect x="252" y="74" width="176" height="36" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="340" y="92" text-anchor="middle" dominant-baseline="central">Makefile</text>
  <rect x="444" y="74" width="176" height="36" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="532" y="92" text-anchor="middle" dominant-baseline="central">Ansible playbook</text>

  <line x1="340" y1="120" x2="340" y2="134" class="arr" marker-end="url(#arrow)"/>

  <!-- Linux runtime -->
  <rect x="40" y="136" width="600" height="300" rx="8" stroke-width="0.5" class="bg-teal"/>
  <text class="th lbl-teal" x="60" y="154" dominant-baseline="central">Linux runtime (direct — no Lima)</text>

  <!-- Security stack -->
  <rect x="60" y="162" width="336" height="260" rx="6" stroke-width="0.5" class="bg-blue"/>
  <text class="th lbl-blue" x="80" y="180" dominant-baseline="central">Security stack</text>

  <rect x="80" y="190" width="296" height="44" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="228" y="206" text-anchor="middle" dominant-baseline="central">Podman (direct)</text>
  <text class="ts" x="228" y="224" text-anchor="middle" dominant-baseline="central">Container runtime</text>

  <line x1="228" y1="234" x2="228" y2="248" class="arr" marker-end="url(#arrow)"/>

  <rect x="80" y="250" width="296" height="44" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="228" y="266" text-anchor="middle" dominant-baseline="central">gVisor (runsc)</text>
  <text class="ts" x="228" y="284" text-anchor="middle" dominant-baseline="central">Kernel-level sandbox</text>

  <line x1="228" y1="294" x2="228" y2="308" class="arr" marker-end="url(#arrow)"/>

  <rect x="80" y="310" width="296" height="44" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="228" y="326" text-anchor="middle" dominant-baseline="central">Dev container</text>
  <text class="ts" x="228" y="344" text-anchor="middle" dominant-baseline="central">Non-root · read-only · no network</text>

  <line x1="228" y1="354" x2="228" y2="368" class="arr" marker-end="url(#arrow)"/>

  <rect x="80" y="370" width="296" height="42" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="228" y="388" text-anchor="middle" dominant-baseline="central">AI coding agent</text>
  <text class="ts" x="228" y="406" text-anchor="middle" dominant-baseline="central">Your code — fully sandboxed</text>

  <!-- Arrow security → obs -->
  <line x1="396" y1="296" x2="416" y2="296" class="arr" marker-end="url(#arrow)"/>

  <!-- Observability (Linux — with Falco) -->
  <rect x="416" y="162" width="204" height="260" rx="6" stroke-width="0.5" class="bg-amber"/>
  <text class="th lbl-amber" x="436" y="180" dominant-baseline="central">Observability</text>

  <rect x="432" y="190" width="172" height="50" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="518" y="208" text-anchor="middle" dominant-baseline="central">Falco</text>
  <text class="ts" x="518" y="226" text-anchor="middle" dominant-baseline="central">Attack rules</text>

  <rect x="432" y="248" width="172" height="50" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="518" y="266" text-anchor="middle" dominant-baseline="central">gVisor strace</text>
  <text class="ts" x="518" y="284" text-anchor="middle" dominant-baseline="central">Syscall log</text>

  <rect x="432" y="306" width="172" height="50" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="518" y="324" text-anchor="middle" dominant-baseline="central">Dozzle</text>
  <text class="ts" x="518" y="342" text-anchor="middle" dominant-baseline="central">Container logs</text>

  <rect x="432" y="364" width="172" height="42" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="518" y="382" text-anchor="middle" dominant-baseline="central">Dashboard</text>
  <text class="ts" x="518" y="400" text-anchor="middle" dominant-baseline="central">Falco + WebSocket</text>

  <line x1="340" y1="436" x2="340" y2="450" class="arr" marker-end="url(#arrow)"/>
  <line x1="518" y1="436" x2="518" y2="450" class="arr" marker-end="url(#arrow)"/>

  <!-- Linux outputs -->
  <rect x="40" y="452" width="600" height="110" rx="8" stroke-width="0.5" class="bg-purple"/>
  <text class="ts lbl-purple" x="60" y="468" dominant-baseline="central">Browser + terminal (direct access)</text>

  <rect x="60"  y="478" width="176" height="52" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="148" y="496" text-anchor="middle" dominant-baseline="central">Dozzle</text>
  <text class="ts" x="148" y="514" text-anchor="middle" dominant-baseline="central">localhost:8888</text>

  <rect x="252" y="478" width="176" height="52" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="340" y="496" text-anchor="middle" dominant-baseline="central">Sec dashboard</text>
  <text class="ts" x="340" y="514" text-anchor="middle" dominant-baseline="central">localhost:9999</text>

  <rect x="444" y="478" width="176" height="52" rx="6" stroke-width="0.5" class="bg-box"/>
  <text class="th lbl-gray" x="532" y="496" text-anchor="middle" dominant-baseline="central">Terminal</text>
  <text class="ts" x="532" y="514" text-anchor="middle" dominant-baseline="central">Falco + events</text>
</svg>
